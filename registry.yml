author: rhkwong
license: MIT
stability: beta
category: planning

when_to_use: "organizing codebase knowledge, classifying files by purpose, maintaining project hygiene, archiving completed work, running periodic codebase reviews"
not_when: "small single-file scripts, throwaway prototypes, repos with fewer than 10 files"

scenarios:
  - "organize a growing codebase into projects, areas, resources, and archive"
  - "classify changed files after a series of commits"
  - "run a periodic review to detect stale projects and archive completed work"
  - "set up automatic triage on git commit via Claude Code hooks"
  - "archive a completed feature branch with proper tagging"

problems:
  - "no consistent system for organizing codebase knowledge"
  - "completed features and spikes linger without being archived"
  - "unclear which files are active projects vs ongoing responsibilities vs reference material"
  - "no automatic trigger to review and classify changed files"
  - "stale projects go undetected"

